<!DOCTYPE html>
<html lang="en">
{% load static %}

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>

    <!-- BOOTSTRAP CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- BOOTSTRAP SCRIPT -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <!-- FONT AWESOME LINK -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- CUSTOM CSS -->
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">

    <!-- Alertify links -->
    <!-- CSS -->
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/alertifyjs@1.14.0/build/css/alertify.min.css" />

    <style>
        .cross {
            color: white;
            position: absolute;
            top: 0;
            right: 8px;
        }

        .cross:hover {
            cursor: pointer;
            color: orangered;
            scale: 1.2;
        }

        #TogglePassword {
            position: absolute;
            top: 55%;
            left: 93%;
        }

        #TogglePassword:hover {
            cursor: pointer;
        }
    </style>


</head>

<body>
    <h3 class="alert alert-info d-flex justify-content-center text-align-center text-success">Welcome to Login Page
    </h3>
    <div class="container d-flex justify-content-center mb-5">

        <div class="main">
            <div class="form-container">
                <a href="{% url 'index' %}">
                    <h2 class="cross"><i class="fa-solid fa-xmark "></i></h2>
                </a>
                <p class="title">Login</p>
                <form class="form" method="POST" action="{% url 'login' %}">
                    {% csrf_token %}

                    <div class="input-group">
                        <label for="username">Username</label>
                        <input type="text" name="username" id="username" placeholder="">
                        <input type="hidden" name="next" value="{{next}}">
                    </div>
                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" name="password" id="password" placeholder="">
                        <i class="fa-solid fa-eye" id="TogglePassword" onclick=TogglePassword()></i>

                    </div>
                    <div>
                        <input type="checkbox" name="remember_me">
                        <label for="">Remember Me</label>
                    </div>
                    <div>
                        <a href="{% url 'password_reset' %}">Forget Password?</a>
                    </div>


                    <button class="sign mt-4">Sign in</button>
                </form>

                <div class="social-message">
                    <div class="line"></div>
                    <p class="message">Login with social accounts</p>
                    <div class="line"></div>
                </div>
                <div class="social-icons">
                    <a href="{% url 'social:begin' 'google-oauth2' %}" class="icon" aria-label="Log in with Google">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" class="w-5 h-5 fill-current">
                            <path
                                d="M16.318 13.714v5.484h9.078c-0.37 2.354-2.745 6.901-9.078 6.901-5.458 0-9.917-4.521-9.917-10.099s4.458-10.099 9.917-10.099c3.109 0 5.193 1.318 6.38 2.464l4.339-4.182c-2.786-2.599-6.396-4.182-10.719-4.182-8.844 0-16 7.151-16 16s7.156 16 16 16c9.234 0 15.365-6.49 15.365-15.635 0-1.052-0.115-1.854-0.255-2.651z">
                            </path>
                        </svg>
                    </a>
                    <a href="{% url 'social:begin' 'github' %}">
                        <button aria-label="Log in with GitHub" class="icon">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" class="w-5 h-5 fill-current">
                                <path
                                    d="M16 0.396c-8.839 0-16 7.167-16 16 0 7.073 4.584 13.068 10.937 15.183 0.803 0.151 1.093-0.344 1.093-0.772 0-0.38-0.009-1.385-0.015-2.719-4.453 0.964-5.391-2.151-5.391-2.151-0.729-1.844-1.781-2.339-1.781-2.339-1.448-0.989 0.115-0.968 0.115-0.968 1.604 0.109 2.448 1.645 2.448 1.645 1.427 2.448 3.744 1.74 4.661 1.328 0.14-1.031 0.557-1.74 1.011-2.135-3.552-0.401-7.287-1.776-7.287-7.907 0-1.751 0.62-3.177 1.645-4.297-0.177-0.401-0.719-2.031 0.141-4.235 0 0 1.339-0.427 4.4 1.641 1.281-0.355 2.641-0.532 4-0.541 1.36 0.009 2.719 0.187 4 0.541 3.043-2.068 4.381-1.641 4.381-1.641 0.859 2.204 0.317 3.833 0.161 4.235 1.015 1.12 1.635 2.547 1.635 4.297 0 6.145-3.74 7.5-7.296 7.891 0.556 0.479 1.077 1.464 1.077 2.959 0 2.14-0.020 3.864-0.020 4.385 0 0.416 0.28 0.916 1.104 0.755 6.4-2.093 10.979-8.093 10.979-15.156 0-8.833-7.161-16-16-16z">
                                </path>
                            </svg>
                        </button>
                    </a>
                </div>
                <p class="signup">Don't have an account?
                    <a href="{% url 'register' %}" class="">Sign up</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        function TogglePassword() {
            const inputPassword = document.getElementById('password')
            const icon = document.getElementById('TogglePassword')

            if (inputPassword.type === 'password') {
                inputPassword.type = 'text';
                icon.classList.remove('fa-eye')
                icon.classList.add('fa-eye-slash')
            }
            else {
                inputPassword.type = 'password';
                icon.classList.remove('fa-eye-slash')
                icon.classList.add('fa-eye')

            }

        }
    </script>
    // <!-- JavaScript -->
    <script src="//cdn.jsdelivr.net/npm/alertifyjs@1.14.0/build/alertify.min.js"></script>

    {% if messages %}

    {% for message in messages %}
    {% if message.tags == 'success' %}
    <script>
        alertify.set('notifier', 'position', 'bottom-right');
        alertify.success('{{ message }}');
    </script>
    {% else %}
    <script>
        alertify.set('notifier', 'position', 'bottom-right');
        alertify.error('{{ message }}');
    </script>
    {% endif %}
    {% endfor %}
    {% endif %}


</body>

</html>
