{% extends "base.html" %}
{% load static %}
{% block css %}
<link rel="stylesheet" href="{% static 'css/menu.css' %}">
<link rel="stylesheet" href="{% static 'css/style.css' %}">
{% endblock css %}
{% block content %}
   
    <div class="container text-white" id="food-menu">
        <img src="{% static 'images/banner-bg.png' %}" alt="image">
        <h1 class="h1">Our Menu</h1>
        <div class="text-center">
            <img src="{% static 'images/menu.png' %}" alt="qr">
        </div>
        {% for i in category  %}
          
        
        <section class="content-menu">
            <aside class="aside-float">
                <nav class="nav-side">
                    <a href="#plates">{{i.title}}<img src="https://i.postimg.cc/65MPq3bs/cutlery.png" alt="Pratos"></a>
                </nav>
            </aside>
            <section class="content-side">
                <section class="items" id="items">
                    <article class="plates" id="plates">
                        <div class="header1" style="background-image: url('{{i.images.url}}');">
                            <h1>{{i.title}}</h1>
                        </div>
                        {% for j in i.items.all %}
                          
                        
                        <ul class="menu-items">
                            <li class="item">
                                <span class="food">{{j.name}}</span>
                                <span class="price">R$ {{j.price}}</span>
                            </li>

                        </ul>
                        {% endfor %}
                    </article>
                </section>
            </section>
        </section>
        {% endfor %}
    </div>


  
{% endblock content %}

   <!-- JavaScript Libraries -->
   <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
   <script src="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/owl.carousel.min.js"></script>
   <script src="https://cdnjs.cloudflare.com/ajax/libs/fancybox/2.1.5/jquery.fancybox.min.js"></script>
   
   <!-- Custom JavaScript -->
   <script src="js/main.js"></script>

</body>
</html>
